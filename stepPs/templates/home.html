{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="text-center mb-4">
        <h1>♠ Poker Team</h1>
        <p>Preencha o formulário para participar</p>
    </div>

    <div class="card p-4 shadow">

        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}

            <!-- Nome -->
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" required>
                <div class="invalid-feedback">
                    Por favor, informe seu nome.
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
                <div class="invalid-feedback">
                    Email inválido.
                </div>
            </div>

            <!-- Nicknames -->
            <div class="mb-3">
                <label class="form-label">Nicknames (se tiver mais de um, separe por vírgula)</label>
                <input type="text" name="nicknames" class="form-control">
            </div>

            <!-- Plataforma -->
            <div class="mb-4">

                <label class="form-label mb-3">Plataformas que você joga</label>

                <div class="plataformas-grid">

                    <label class="plataforma-card">
                        <input type="checkbox" name="plataformas" value="PokerStars">
                        <span>PokerStars</span>
                    </label>

                    <label class="plataforma-card">
                        <input type="checkbox" name="plataformas" value="partypoker">
                        <span>partypoker</span>
                    </label>

                    <label class="plataforma-card">
                        <input type="checkbox" name="plataformas" value="888poker">
                        <span>888poker</span>
                    </label>

                    <label class="plataforma-card">
                        <input type="checkbox" name="plataformas" value="GGPoker">
                        <span>GGPoker</span>
                    </label>

                    <label class="plataforma-card">
                        <input type="checkbox" name="plataformas" value="Outros">
                        <span>Outros</span>
                    </label>

            </div>

    <!-- erro -->
    <div id="erro-plataformas" class="text-danger mt-2 d-none">
        Selecione pelo menos uma plataforma.
    </div>

</div>

            <!-- Perguntas -->
            <div class="mb-3">
                <label class="form-label">Experiência no poker</label>
                <textarea name="pergunta1" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Objetivo no poker</label>
                <textarea name="pergunta2" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Por que quer entrar?</label>
                <textarea name="pergunta3" class="form-control" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Enviar inscrição
            </button>

        </form>

    </div>

</div>

{% endblock %}
