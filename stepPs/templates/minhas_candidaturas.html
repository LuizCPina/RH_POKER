{% extends "base.html" %}

{% block content %}

<h1>Minhas candidaturas</h1>

{% for candidatura in candidaturas %}

    <h2>{{ candidatura.vaga.titulo }}</h2>
    <p>Status: {{ candidatura.status }}</p>
    <hr>

{% empty %}

    <p>Você ainda não se candidatou a nenhuma vaga.</p>

{% endfor %}

{% endblock %}
